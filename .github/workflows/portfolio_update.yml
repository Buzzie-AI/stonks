name: Daily Portfolio Update

on:
  schedule:
    # 4:05 PM ET on weekdays (after market close)
    - cron: "5 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update portfolio
        run: |
          python scripts/update_portfolio.py --config config/config.yml
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

      - name: Commit portfolio update
        run: |
          git config user.name "stonks-bot"
          git config user.email "bot@stonks-portfolio.local"
          git add data/portfolio.json README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily: portfolio update $(date -u +%Y-%m-%d)"
            git push
          fi
